<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KI-Beratung — Kontaktformular</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 520px;
            padding: 2.5rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            color: #6e6e73;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #6e6e73;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 0.35rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.7rem 0.85rem;
            border: 1.5px solid #d2d2d7;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            color: #1d1d1f;
            background: #fff;
            transition: border-color 0.15s, box-shadow 0.15s;
            margin-bottom: 1.1rem;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #0071e3;
            box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
        }

        textarea { resize: vertical; min-height: 100px; }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 1rem;
        }

        button {
            width: 100%;
            padding: 0.8rem;
            background: #0071e3;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 0.5rem;
        }

        button:hover { background: #0077ed; }
        button:active { background: #006edb; }
        button:disabled { background: #a1a1a6; cursor: not-allowed; }

        .success {
            display: none;
            text-align: center;
            padding: 2rem 0;
        }

        .success .icon {
            width: 56px;
            height: 56px;
            background: #34c759;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .success .icon svg { width: 28px; height: 28px; }

        .success h2 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
        }

        .success p {
            color: #6e6e73;
            font-size: 0.9rem;
        }

        .error-msg {
            display: none;
            background: #fff2f2;
            color: #d70015;
            padding: 0.65rem 0.85rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 480px) {
            .card { padding: 1.5rem; }
            .row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div id="form-view">
            <h1>Kontakt aufnehmen</h1>
            <p class="subtitle">Wir melden uns innerhalb von 30 Sekunden.</p>

            <div id="error" class="error-msg"></div>

            <form id="lead-form" novalidate>
                <label for="name">Name *</label>
                <input type="text" id="name" name="name" required placeholder="Max Mustermann">

                <div class="row">
                    <div>
                        <label for="email">E-Mail *</label>
                        <input type="email" id="email" name="email" required placeholder="max@firma.de">
                    </div>
                    <div>
                        <label for="phone">Telefon</label>
                        <input type="tel" id="phone" name="phone" placeholder="+49 123 456789">
                    </div>
                </div>

                <label for="service">Service</label>
                <select id="service" name="service">
                    <option value="">Bitte wählen...</option>
                    <option value="KI-Automatisierung">KI-Automatisierung</option>
                    <option value="Dokumentenverarbeitung">Dokumentenverarbeitung</option>
                    <option value="KI-Telefonie">KI-Telefonie</option>
                    <option value="Prozessoptimierung">Prozessoptimierung</option>
                    <option value="Chatbot">Chatbot</option>
                    <option value="Workshop">Workshop</option>
                    <option value="AI Strategy">AI Strategy</option>
                    <option value="Allgemein">Allgemein</option>
                </select>

                <label for="message">Nachricht *</label>
                <textarea id="message" name="message" required placeholder="Beschreiben Sie kurz Ihr Anliegen..."></textarea>

                <input type="hidden" name="source" value="Website">

                <button type="submit" id="submit-btn">Anfrage senden</button>
            </form>
        </div>

        <div id="success-view" class="success">
            <div class="icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h2>Anfrage gesendet!</h2>
            <p>Vielen Dank. Wir melden uns in Kürze bei Ihnen.</p>
        </div>
    </div>

    <script>
        // CONFIGURE: Set your n8n webhook URL here
        const WEBHOOK_URL = '/webhook/lead';

        const form = document.getElementById('lead-form');
        const errorEl = document.getElementById('error');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.style.display = 'none';

            const name = form.name.value.trim();
            const email = form.email.value.trim();
            const message = form.message.value.trim();

            if (!name || !email || !message) {
                errorEl.textContent = 'Bitte füllen Sie alle Pflichtfelder aus.';
                errorEl.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = 'Wird gesendet...';

            const payload = {
                name,
                email,
                phone: form.phone.value.trim(),
                service: form.service.value,
                message,
                source: 'Website',
            };

            try {
                const res = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                document.getElementById('form-view').style.display = 'none';
                document.getElementById('success-view').style.display = 'block';
            } catch (err) {
                errorEl.textContent = 'Fehler beim Senden. Bitte versuchen Sie es erneut.';
                errorEl.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Anfrage senden';
            }
        });
    </script>
</body>
</html>
